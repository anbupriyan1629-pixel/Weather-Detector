<!DOCTYPE html>
<html>
<head>
    <title>Tamil Nadu District Weather</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top left, rgba(84, 116, 255, 0.35), transparent 32%),
                        radial-gradient(circle at bottom right, rgba(128, 255, 219, 0.18), transparent 28%),
                        linear-gradient(180deg, #07101f 0%, #162d4b 55%, #101b29 100%);
            color: #e8eef7;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 32px;
        }
        .container {
            width: 100%;
            max-width: 540px;
            padding: 36px 32px;
            border-radius: 28px;
            background: linear-gradient(180deg, rgba(16, 27, 47, 0.98), rgba(14, 22, 36, 0.92));
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.35);
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: '';
            position: absolute;
            left: -40px;
            top: -20px;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            filter: blur(22px);
        }
        h1 {
            margin: 0 0 10px;
            font-size: 2.4rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        p.subtitle {
            margin: 0 0 28px;
            color: #acc8f2;
            font-size: 1rem;
            line-height: 1.6;
        }
        input[type="search"] {
            width: 100%;
            padding: 16px 20px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.06);
            color: #f3f7ff;
            font-size: 1rem;
            outline: none;
            margin-bottom: 18px;
            transition: border-color 0.2s ease, background 0.2s ease;
        }
        input[type="search"]:focus {
            border-color: rgba(124, 145, 255, 0.9);
            background: rgba(255,255,255,0.10);
        }
        button {
            width: 100%;
            padding: 16px 20px;
            border-radius: 18px;
            border: none;
            background: linear-gradient(135deg, #5d8bff, #a7d8ff);
            color: #08133a;
            font-weight: 800;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.07);
        }
        .footer {
            margin-top: 18px;
            font-size: 0.95rem;
            color: #b4c8e8;
        }
        datalist {
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>TN Weather Hub</h1>
    <p class="subtitle">Search any Tamil Nadu district directly and get a fresh sample weather style.</p>
    <form method="POST">
        <input id="districtSearch" name="city" type="search" list="districts" placeholder="Type district name..." autocomplete="off" required />
        <datalist id="districts">
            {% for district in districts %}
            <option value="{{ district }}"></option>
            {% endfor %}
        </datalist>
        <button type="submit">See Weather</button>
    </form>
    <div class="footer">Unique Tamil Nadu district lookup with a dark/light glass UI.</div>
</div>
</body>
</html>
