<!DOCTYPE html>
<html>
<head>
    <title>Weather Result</title>
    <style>
        :root {
            color-scheme: dark;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 20%),
                        radial-gradient(circle at bottom right, rgba(183,255,223,0.12), transparent 28%),
                        linear-gradient(180deg, #07121f 0%, #101e33 48%, #121b28 100%);
            color: #eef4ff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        .page {
            width: 100%;
            max-width: 700px;
            position: relative;
        }
        .hero {
            padding: 34px 32px 28px;
            border-radius: 34px;
            background: linear-gradient(180deg, rgba(17, 28, 52, 0.96), rgba(12, 19, 32, 0.95));
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 35px 95px rgba(0,0,0,0.30);
            position: relative;
            overflow: hidden;
        }
        .hero::after {
            content: '';
            position: absolute;
            right: -70px;
            top: -40px;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: rgba(96, 183, 255, 0.14);
            filter: blur(24px);
        }
        .hero::before {
            content: '';
            position: absolute;
            left: -60px;
            bottom: -50px;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(196, 150, 255, 0.12);
            filter: blur(22px);
        }
        .header {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }
        .header h1 {
            margin: 0;
            font-size: 2.6rem;
            line-height: 1.05;
            letter-spacing: 0.04em;
        }
        .status {
            color: #97b6ff;
            font-size: 1rem;
            margin-top: 10px;
        }
        .temp-badge {
            min-width: 118px;
            padding: 18px 22px;
            border-radius: 26px;
            background: rgba(255,255,255,0.11);
            border: 1px solid rgba(255,255,255,0.16);
            text-align: center;
            backdrop-filter: blur(15px);
        }
        .temp-badge .value {
            font-size: 2.6rem;
            font-weight: 800;
            margin: 0;
            color: #dff4ff;
        }
        .temp-badge .label {
            font-size: 0.95rem;
            color: #bae0ff;
            margin-top: 6px;
        }
        .info-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 22px;
            position: relative;
            z-index: 1;
        }
        .info-chip {
            flex: 1 1 160px;
            min-width: 160px;
            padding: 18px 20px;
            border-radius: 22px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
            border: 1px solid rgba(255,255,255,0.10);
            color: #eef4ff;
        }
        .info-chip h3 {
            margin: 0 0 8px;
            font-size: 0.95rem;
            color: #9fbfff;
            font-weight: 600;
        }
        .info-chip p {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.01em;
        }
        #output {
            margin-top: 28px;
            padding: 22px 24px;
            border-radius: 26px;
            background: linear-gradient(180deg, rgba(11, 21, 38, 0.98), rgba(14, 26, 48, 0.98));
            border: 1px solid rgba(255,255,255,0.08);
            color: #d6e7ff;
            line-height: 1.7;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
            font-size: 1rem;
            position: relative;
            overflow: hidden;
        }
        #output::before {
            content: '';
            position: absolute;
            left: -24px;
            top: -24px;
            width: 80px;
            height: 80px;
            background: rgba(118, 187, 255, 0.08);
            border-radius: 50%;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 30px;
            width: 100%;
            padding: 16px 20px;
            border-radius: 24px;
            color: #0f1930;
            background: #c8e2ff;
            text-decoration: none;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .back-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 34px rgba(0,0,0,0.18);
        }
    </style>
</head>
<body>
<div class="page">
    <section class="hero">
        <div class="header">
            <div>
                <h1>TN Weather Pulse</h1>
                <div class="status">Stylish weather for your chosen Tamil Nadu district</div>
            </div>
            <div class="temp-badge">
                <p class="value">{{ temp }}°C</p>
                <p class="label">Feels like now</p>
            </div>
        </div>
        <div class="info-row">
            <div class="info-chip">
                <h3>District</h3>
                <p>{{ city }}</p>
            </div>
            <div class="info-chip">
                <h3>Humidity</h3>
                <p>{{ humidity }}%</p>
            </div>
            <div class="info-chip">
                <h3>Condition</h3>
                <p>{{ desc }}</p>
            </div>
        </div>
        <div id="output"></div>
        <a class="back-link" href="/">⬅️ Back to districts</a>
    </section>
</div>

<script>
    window.city = "{{ city }}";
    window.temp = "{{ temp }}";
    window.desc = "{{ desc }}";
    window.humidity = "{{ humidity }}";
</script>
<script src="/static/script.js"></script>
</body>
</html>
